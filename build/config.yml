dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend/bindings
      - frontend/dist
      - build/bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.html"
      - "*.css"
      - "*.js"
      - "*.jsx"
    git_ignore: true
  executes:
    - cmd: wails3 task common:install:frontend:deps
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: go mod tidy
      type: blocking
    - cmd: env MACOSX_DEPLOYMENT_TARGET=14.0 go build -o build/bin/gutgd .
      type: blocking
    - cmd: env MACOSX_DEPLOYMENT_TARGET=14.0 go run .
      type: primary
